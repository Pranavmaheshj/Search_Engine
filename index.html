<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131314; --text-color: #e3e3e3; --input-bg: #1e1f20;
            --user-msg-bg: #3c4655; --bot-msg-bg: #292a2d; --border-color: #444746;
            --link-color: #8ab4f8; --hover-bg: #333435; --icon-color: #9aa0a6;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Google Sans', 'Roboto', sans-serif; background-color: var(--bg-color);
            color: var(--text-color); display: flex; height: 100vh; overflow: hidden;
        }
        .sidebar { width: 250px; background-color: var(--input-bg); padding: 15px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        .sidebar h2 { margin-top: 0; font-weight: 500; font-size: 1.1em; }
        #new-chat-btn { background-color: var(--bot-msg-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 14px; margin-bottom: 15px; width: 100%; }
        #new-chat-btn:hover { background-color: var(--hover-bg); }
        #chat-history-list { display: flex; flex-direction: column; gap: 5px; }
        .history-item { background-color: transparent; border: none; color: var(--text-color); padding: 10px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item.active, .history-item:hover { background-color: var(--hover-bg); }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        #drop-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.7); border: 3px dashed var(--user-msg-bg); border-radius: 20px; margin: 20px; display: none; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; z-index: 10; pointer-events: none; }
        .main-content.is-dragging #drop-overlay { display: flex; }
        .container { display: flex; flex-direction: column; width: 100%; height: 100%; max-width: 900px; margin: 0 auto; }
        .chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 25px; }
        .message { max-width: 90%; padding: 15px 20px; border-radius: 20px; line-height: 1.6; word-wrap: break-word; animation: fadeIn 0.5s ease-in-out; }
        .user-message { background-color: var(--user-msg-bg); align-self: flex-end; }
        .user-message img { max-width: 250px; border-radius: 12px; display: block; }
        .bot-message { background-color: var(--bg-color); align-self: flex-start; white-space: pre-wrap; }
        .bot-message a { color: var(--link-color); text-decoration: none; font-weight: 500; }
        .bot-message hr { border: none; border-top: 1px solid var(--border-color); margin: 16px 0; }
        .bot-message b { color: #c4c7c5; font-weight: 500; }
        .youtube-suggestion iframe { border-radius: 8px; border: none; width: 100%; max-width: 560px; height: 315px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-area { padding: 1rem 1.5rem; }
        #chat-form { display: flex; align-items: center; background-color: var(--input-bg); border-radius: 28px; padding: 6px; box-shadow: 0 1px 2px 0 rgba(0,0,0,.3), 0 1px 3px 1px rgba(0,0,0,.15); }
        #text-input { flex-grow: 1; background: transparent; border: none; color: var(--text-color); font-size: 16px; padding: 14px; outline: none; }
        #file-input { display: none; }
        .icon-button { background: transparent; border: none; cursor: pointer; padding: 12px; border-radius: 50%; display: flex; }
        .icon { width: 24px; height: 24px; fill: var(--icon-color); }
        .options-bar { display: flex; justify-content: center; align-items: center; gap: 20px; padding: 10px 0; flex-wrap: wrap; }
        .mode-selector { position: relative; display: flex; background-color: var(--input-bg); padding: 4px; border-radius: 20px; }
        .mode-selector input { display: none; }
        .mode-selector label { padding: 8px 16px; border-radius: 16px; cursor: pointer; z-index: 2; font-size: 14px; }
        .mode-selector-highlight { position: absolute; top: 4px; height: calc(100% - 8px); background-color: var(--user-msg-bg); border-radius: 16px; transition: all 0.4s ease; z-index: 1; }
        select { font-size: 14px; background-color: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 20px; padding: 8px 16px; }
        .thinking::after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <button id="new-chat-btn">➕ New Chat</button>
        <h2>Chat History</h2>
        <div id="chat-history-list"></div>
    </div>
    <div class="main-content" id="main-content">
        <div id="drop-overlay"><p>Drop File to Upload</p></div>
        <div class="container">
            <div class="chat-container" id="chat-container"></div>
            <div class="input-area">
                <div class="options-bar">
                     <div class="mode-selector">
                        <div class="mode-selector-highlight"></div>
                        <input type="radio" id="mode-search" name="mode" value="search" checked><label for="mode-search">Web</label>
                        <input type="radio" id="mode-document" name="mode" value="document"><label for="mode-document">Doc</label>
                        <input type="radio" id="mode-image" name="mode" value="image"><label for="mode-image">Image</label>
                        <input type="radio" id="mode-video" name="mode" value="video"><label for="mode-video">Video</label>
                    </div>
                     <select id="age-group-select">
                        <option value="adult">For an Adult</option>
                        <option value="child">For a Child</option>
                        <option value="teen">For a Teen</option>
                        <option value="senior">For a Senior</option>
                    </select>
                </div>
                <form id="chat-form">
                    <div class="icon-button" id="file-attach-button" title="Attach file">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v11.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"></path></svg>
                    </div>
                    <input type="file" id="file-input" accept=".txt,.pdf,.docx,.jpg,.jpeg,.png,.mp4,.mov,.avi,.webm">
                    <input type="text" id="text-input" placeholder="Enter a prompt or video URL...">
                    <button type="submit" class="icon-button" title="Send message">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('chat-form');
        const textInput = document.getElementById('text-input');
        const fileInput = document.getElementById('file-input');
        const chatContainer = document.getElementById('chat-container');
        const mainContent = document.getElementById('main-content');
        const newChatBtn = document.getElementById('new-chat-btn');
        const chatHistoryList = document.getElementById('chat-history-list');
        const modeSelector = document.querySelector('.mode-selector');
        const highlight = document.querySelector('.mode-selector-highlight');
        const fileAttachButton = document.getElementById('file-attach-button');
        const ageGroupSelect = document.getElementById('age-group-select');
        const API_BASE_URL = 'http://127.0.0.1:8000/api';
        let languageMap = {};
        const MAX_HISTORY_MESSAGES_PER_CHAT = 50;

        // --- Event Listeners & Initializers ---
        window.addEventListener('load', async () => {
            loadActiveChat();
            renderChatList();
            updateHighlight();
            try {
                const response = await fetch(`${API_BASE_URL}/languages`);
                languageMap = await response.json();
            } catch (error) { console.error('Failed to load languages:', error); }
        });
        modeSelector.addEventListener('change', updateHighlight);
        newChatBtn.addEventListener('click', startNewChat);
        form.addEventListener('submit', handleFormSubmit);
        mainContent.addEventListener('dragover', (e) => { e.preventDefault(); mainContent.classList.add('is-dragging'); });
        mainContent.addEventListener('dragleave', () => mainContent.classList.remove('is-dragging'));
        mainContent.addEventListener('drop', handleDrop);
        window.addEventListener('paste', handlePaste);
        fileAttachButton.addEventListener('click', (e) => {
            e.preventDefault();
            const selectedMode = document.querySelector('input[name="mode"]:checked').value;
            if (['document', 'image', 'video'].includes(selectedMode)) fileInput.click();
            else alert('Please switch to a file mode (Doc, Image, Video) to attach a file.');
        });

        // --- Main Handler Functions ---
        async function handleFormSubmit(e) {
            e.preventDefault();
            const selectedMode = document.querySelector('input[name="mode"]:checked').value;
            const query = textInput.value.trim();
            const file = fileInput.files[0];
            const ageGroup = ageGroupSelect.value;

            if (selectedMode === 'search') { if (query) handleSearch(query, ageGroup); }
            else if (selectedMode === 'video') {
                if (query) handleVideo(query, ageGroup);
                else if (file) handleFileUpload(selectedMode, file, ageGroup);
                else alert('For Video mode, paste a URL or attach a video file.');
            } else {
                if (file) handleFileUpload(selectedMode, file, ageGroup);
                else alert('Please select a file to upload for this mode.');
            }
        }
        
        function handleDrop(e) {
            e.preventDefault(); mainContent.classList.remove('is-dragging');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        }
        function handlePaste(e) {
            const file = e.clipboardData.files[0];
            if (file) { e.preventDefault(); handleFile(file); }
        }

        function handleFile(file) {
            let mode = 'document';
            if (file.type.startsWith('image/')) mode = 'image';
            else if (file.type.startsWith('video/')) mode = 'video';
            document.querySelector(`input[name="mode"][value="${mode}"]`).checked = true;
            updateHighlight();
            handleFileUpload(mode, file, ageGroupSelect.value);
        }

        async function handleSearch(fullQuery, ageGroup) {
            displayMessage(fullQuery, 'user');
            saveMessageToHistory('user', fullQuery);
            renderChatList();
            textInput.value = '';
            const langRegex = / in ([\w\s\(\)]+)$/i;
            const match = fullQuery.match(langRegex);
            let cleanQuery = fullQuery;
            let translateTo = '';
            if (match && match[1]) {
                const langName = match[1].trim().toLowerCase();
                if (languageMap[langName]) {
                    translateTo = languageMap[langName];
                    cleanQuery = fullQuery.replace(langRegex, '').trim();
                }
            }
            const url = `${API_BASE_URL}/search-and-process?query=${encodeURIComponent(cleanQuery)}&age_group=${ageGroup}&translate_to=${translateTo || ''}`;
            await handleApiCall(() => fetch(url));
        }
        
        async function handleFileUpload(mode, file, ageGroup) {
            // Show image preview
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    displayMessage(`<img src="${e.target.result}" style="max-width: 250px; border-radius: 12px;" alt="${file.name}">`, 'user');
                };
                reader.readAsDataURL(file);
            } else {
                displayMessage(`Uploading: <i>${file.name}</i>`, 'user');
            }
            saveMessageToHistory('user', `Uploaded file: ${file.name}`);
            renderChatList();
            fileInput.value = '';
            const formData = new FormData();
            formData.append('file', file);
            formData.append('age_group', ageGroup);
            const endpoint = `/summarize-${mode}/`;
            await handleApiCall(() => fetch(API_BASE_URL + endpoint, { method: 'POST', body: formData }));
        }

        async function handleVideo(url, ageGroup) {
            displayMessage(`Processing URL: ${url}`, 'user');
            saveMessageToHistory('user', url);
            renderChatList();
            textInput.value = '';
            const formData = new FormData();
            formData.append('video_url', url);
            formData.append('age_group', ageGroup);
            await handleApiCall(() => fetch(`${API_BASE_URL}/summarize-video/`, { method: 'POST', body: formData }));
        }

        async function handleApiCall(apiCallFunction) {
            displayMessage('Thinking...', 'bot', true);
            try {
                const response = await apiCallFunction();
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                const result = await response.json();
                const formattedResponse = formatApiResponse(result);
                updateLastBotMessage(formattedResponse);
                saveMessageToHistory('bot', formattedResponse);
            } catch (error) {
                const errorMessage = `Sorry, an error occurred. Error: ${error.message}`;
                updateLastBotMessage(errorMessage);
                saveMessageToHistory('bot', errorMessage);
            }
        }

        // --- UI, Formatting & History Functions ---
        function formatApiResponse(result) {
            let mainContent = result.translated_summary || result.summary || 'No summary available.';
            let htmlOutput = `<p style="font-family: sans-serif;">${mainContent.replace(/\n/g, '<br>')}</p>`;
            if (result.youtube_suggestion && result.youtube_suggestion.id) {
                htmlOutput += `<div class="youtube-suggestion"><b>▶️ Suggested YouTube Video:</b><p>${result.youtube_suggestion.title}</p><iframe src="https://www.youtube.com/embed/${result.youtube_suggestion.id}" frameborder="0" allowfullscreen></iframe></div>`;
            }
            return htmlOutput;
        }

        function getHistory() {
            const history = localStorage.getItem('multiChatHistory');
            if (history) { const parsed = JSON.parse(history); return { activeChatId: parsed.activeChatId || null, chatSessions: parsed.chatSessions || {} }; }
            return { activeChatId: null, chatSessions: {} };
        }
        function saveHistory(history) { localStorage.setItem('multiChatHistory', JSON.stringify(history)); }
        function startNewChat() {
            let history = getHistory();
            const newChatId = `chat_${Date.now()}`;
            history.activeChatId = newChatId;
            history.chatSessions[newChatId] = [{ sender: 'bot', content: "Hello! How can I help?" }];
            saveHistory(history);
            loadActiveChat();
            renderChatList();
        }
        function switchChat(chatId) {
            let history = getHistory();
            history.activeChatId = chatId;
            saveHistory(history);
            loadActiveChat();
            renderChatList();
        }
        function saveMessageToHistory(sender, content) {
            let history = getHistory();
            if (!history.activeChatId) { startNewChat(); history = getHistory(); }
            let activeChat = history.chatSessions[history.activeChatId] || [];
            activeChat.push({ sender, content });
            if (activeChat.length > MAX_HISTORY_MESSAGES_PER_CHAT) activeChat = activeChat.slice(activeChat.length - MAX_HISTORY_MESSAGES_PER_CHAT);
            history.chatSessions[history.activeChatId] = activeChat;
            saveHistory(history);
        }
        function loadActiveChat() {
            chatContainer.innerHTML = '';
            let history = getHistory();
            if (!history.activeChatId || !history.chatSessions[history.activeChatId]) { startNewChat(); return; }
            const activeChat = history.chatSessions[history.activeChatId];
            activeChat.forEach(msg => displayMessage(msg.content, msg.sender));
        }
        function renderChatList() {
            chatHistoryList.innerHTML = '';
            const history = getHistory();
            const sortedChatIds = Object.keys(history.chatSessions).sort((a, b) => b.split('_')[1] - a.split('_')[1]);
            sortedChatIds.forEach(chatId => {
                const session = history.chatSessions[chatId];
                const firstUserMessage = session.find(msg => msg.sender === 'user');
                if (!firstUserMessage) return;
                const item = document.createElement('button');
                item.className = 'history-item';
                item.textContent = item.title = firstUserMessage.content.startsWith('<img') ? 'Image Upload' : firstUserMessage.content;
                if (chatId === history.activeChatId) item.classList.add('active');
                item.onclick = () => switchChat(chatId);
                chatHistoryList.appendChild(item);
            });
        }
        
        function displayMessage(message, sender, isLoading = false) {
            const existingLoading = document.getElementById('loading-message');
            if(existingLoading) existingLoading.remove();
            const msgElement = document.createElement('div');
            msgElement.className = `message ${sender}-message`;
            if (isLoading) { msgElement.classList.add('thinking'); msgElement.id = 'loading-message'; }
            msgElement.innerHTML = message;
            chatContainer.appendChild(msgElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function updateLastBotMessage(newMessage) {
            const loadingElement = document.getElementById('loading-message');
            if (loadingElement) {
                loadingElement.innerHTML = newMessage;
                loadingElement.classList.remove('thinking');
                loadingElement.id = '';
            } else { displayMessage(newMessage, 'bot'); }
        }

        function updateHighlight() {
            const checkedRadio = modeSelector.querySelector('input:checked');
            const checkedLabel = modeSelector.querySelector(`label[for=${checkedRadio.id}]`);
            if (checkedLabel) {
                highlight.style.width = `${checkedLabel.offsetWidth}px`;
                highlight.style.height = `${checkedLabel.offsetHeight}px`;
                highlight.style.left = `${checkedLabel.offsetLeft}px`;
            }
        }
    </script>
</body>
</html>
